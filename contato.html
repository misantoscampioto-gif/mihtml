<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produto</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/estilos.css" />
</head>

<body>

  <!-- NAVBAR (mantive a sua) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="sobre.html">Sobre</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contato.html">Contato</a>
        </li>
      </ul>
    
    </div>
  </nav>

  <!-- IMAGEM (AGORA NO LUGAR CERTO) -->
  <img src="img/tela.gato.gif" 
       class="w-100 d-block"
       style="height: 300px; object-fit: cover;">

  <div class="container mt-3">
    <h3>Cadastro de Produto</h3>

    <form class="row g-3">

      <!-- Nome -->
      <div class="col-md-6 col-sm-12">
        <div class="form-floating">
          <input
            type="text"
            id="nome"
            class="form-control"
            placeholder="Nome do produto"
            required
          />
          <label for="nome">Nome do produto</label>
        </div>
      </div>

      <!-- Valor -->
      <div class="col-md-3 col-sm-12">
        <div class="form-floating">
          <input
            type="number"
            id="valor"
            class="form-control"
            placeholder="Valor"
            step="0.5"
            required
          />
          <label for="valor">Valor (R$)</label>
        </div>
      </div>

      <!-- Quantidade -->
      <div class="col-md-3 col-sm-12">
        <div class="form-floating">
          <input
            type="number"
            id="quantidade"
            class="form-control"
            placeholder="Quantidade"
            required
          />
          <label for="quantidade">Quantidade</label>
        </div>
      </div>

      <!-- Categoria -->
      <div class="col-md-6 col-sm-12">
        <div class="form-floating">
          <select id="categoria" class="form-select" required>
            <option value="" disabled selected>Selecione</option>
            <option value="eletronico">Adesivos</option>
            <option value="roupa">figurinhas</option>
            <option value="alimento">Gifs</option>
          </select>
          <label for="categoria">Categoria</label>
        </div>
      </div>

      <!-- Fabricado em -->
      <div class="col-md-6 col-sm-12">
        <label class="form-label d-block">Fabricado em</label>

        <div class="form-check form-check-inline">
          <input type="radio" name="fabricado" id="sp" class="form-check-input">
          <label for="sp" class="form-check-label">SP</label>
        </div>

        <div class="form-check form-check-inline">
          <input type="radio" name="fabricado" id="rj" class="form-check-input">
          <label for="rj" class="form-check-label">RJ</label>
        </div>

        <div class="form-check form-check-inline">
          <input type="radio" name="fabricado" id="mg" class="form-check-input">
          <label for="mg" class="form-check-label">MG</label>
        </div>
      </div>

      <!-- Botão -->
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </div>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
